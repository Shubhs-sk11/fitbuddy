<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBuddy AI - Workout Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: rgba(14, 18, 26, 0.75);
            --panel: rgba(19, 24, 36, 0.88);
            --text: #f5f7fb;
            --muted: #b5bfd6;
            --line: rgba(255, 255, 255, 0.14);
            --primary: #2f78ff;
            --primary-hover: #195dd7;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Roboto", sans-serif;
            color: var(--text);
            background:
                linear-gradient(180deg, rgba(4, 7, 14, 0.3), rgba(4, 7, 14, 0.75)),
                url("/static/images/gym-bg.jpg") center/cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 560px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            backdrop-filter: blur(3px);
            padding: 26px 22px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }
        .title {
            margin: 0 0 6px;
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 0.2px;
        }
        .subtitle {
            margin: 0 0 20px;
            color: var(--muted);
            font-size: 0.95rem;
        }
        fieldset {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 14px;
            margin: 0 0 14px;
        }
        legend {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--muted);
            padding: 0 8px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-size: 0.85rem;
            font-weight: 700;
        }
        input, select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            padding: 10px 12px;
            font-size: 0.95rem;
            outline: none;
        }
        select option {
            color: #1d2230;
        }
        input:focus, select:focus {
            border-color: var(--primary);
        }
        .actions {
            margin-top: 10px;
        }
        button {
            width: 100%;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            padding: 11px 16px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover {
            background: var(--primary-hover);
        }
        @media (max-width: 700px) {
            .card {
                padding: 18px 14px;
            }
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1 class="title">FitBuddy AI Workout Generator</h1>
        <p class="subtitle">Enter your profile and training preferences to generate your 7-day plan.</p>

        <form action="/generate-workout" method="post">
            <fieldset>
                <legend>Personal Information</legend>
                <div class="grid">
                    <div class="field">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter your name" required>
                    </div>
                    <div class="field">
                        <label for="user_id">User ID</label>
                        <input type="number" id="user_id" name="user_id" placeholder="e.g. 101" min="1" required>
                    </div>
                    <div class="field">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" placeholder="e.g. 24" min="1" required>
                    </div>
                    <div class="field">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" name="weight" placeholder="e.g. 68" min="1" step="0.1" required>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Workout Preferences</legend>
                <div class="grid">
                    <div class="field">
                        <label for="goal">Fitness Goal</label>
                        <select id="goal" name="goal" required>
                            <option value="">Select goal</option>
                            <option value="Weight Loss">Weight Loss</option>
                            <option value="Muscle Gain">Muscle Gain</option>
                            <option value="General Fitness">General Fitness</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="intensity">Workout Intensity</label>
                        <select id="intensity" name="intensity" required>
                            <option value="">Select intensity</option>
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <div class="actions">
                <button type="submit">Generate Plan</button>
            </div>
        </form>
    </main>
</body>
</html>
